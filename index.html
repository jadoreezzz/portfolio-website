<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jadoree</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --bg:#080808; --card:#0f0f0f; --border:#1c1c1c; --text:#e8e8e8; --muted:#333; }
html,body { width:100vw; height:100vh; overflow:hidden; background:var(--bg); color:var(--text); font-family:'SF Mono','Fira Code',monospace; user-select:none; }
#grid { position:fixed; inset:0; z-index:0; pointer-events:none; background-image:radial-gradient(circle,#191919 1px,transparent 1px); background-size:30px 30px; }
#canvas { position:fixed; inset:0; z-index:1; overflow:hidden; cursor:default; }
#world  { position:absolute; top:0; left:0; width:0; height:0; transform-origin:0 0; will-change:transform; }
svg#conn { position:absolute; top:0; left:0; width:8000px; height:8000px; overflow:visible; pointer-events:none; }
svg#conn path { fill:none; stroke:#222; stroke-width:1.5; }

/* ── vignette ── */
#vignette-blur { position:fixed; inset:0; z-index:2; pointer-events:none; backdrop-filter:blur(20px) saturate(.7) brightness(.9); -webkit-backdrop-filter:blur(20px) saturate(.7) brightness(.9); -webkit-mask-image:radial-gradient(ellipse 68% 58% at 50% 50%,transparent 0%,transparent 42%,rgba(0,0,0,.1) 60%,rgba(0,0,0,.5) 78%,black 100%); mask-image:radial-gradient(ellipse 68% 58% at 50% 50%,transparent 0%,transparent 42%,rgba(0,0,0,.1) 60%,rgba(0,0,0,.5) 78%,black 100%); transition:opacity .7s; }
#vignette-dark { position:fixed; inset:0; z-index:3; pointer-events:none; background: radial-gradient(ellipse 85% 76% at 50% 50%,transparent 40%,rgba(0,0,0,.52) 100%), linear-gradient(to right,rgba(0,0,0,.38) 0%,rgba(0,0,0,.1) 16%,transparent 32%,transparent 68%,rgba(0,0,0,.1) 84%,rgba(0,0,0,.38) 100%), linear-gradient(to bottom,rgba(0,0,0,.18) 0%,transparent 16%,transparent 84%,rgba(0,0,0,.18) 100%); transition:opacity .7s; }
#vignette-rim { position:fixed; inset:0; z-index:4; pointer-events:none; box-shadow:inset 40px 0 80px rgba(0,0,0,.22),inset -40px 0 80px rgba(0,0,0,.22),inset 0 30px 60px rgba(0,0,0,.12),inset 0 -30px 60px rgba(0,0,0,.12); transition:box-shadow .7s; }
body.popup-open #vignette-dark { opacity:2.8; }
body.popup-open #vignette-blur { opacity:2; }
body.popup-open #vignette-rim { box-shadow:inset 90px 0 180px rgba(0,0,0,.8),inset -90px 0 180px rgba(0,0,0,.8),inset 0 70px 140px rgba(0,0,0,.6),inset 0 -70px 140px rgba(0,0,0,.6); }

/* ── squeeze glass ── */
#squeeze { position:fixed; inset:0; z-index:9000; pointer-events:none; background:radial-gradient(ellipse 50% 46% at 50% 50%,transparent 0%,rgba(4,4,4,.97) 68%); backdrop-filter:blur(32px) saturate(.15); -webkit-backdrop-filter:blur(32px) saturate(.15); opacity:0; transition:opacity .55s cubic-bezier(.4,0,.2,1); }
body.popup-open #squeeze { opacity:1; pointer-events:all; }

/* ═══ POPUP — floating, no card ═══ */
#popup { position:fixed; inset:0; z-index:9999; display:none; pointer-events:none; }
#popup.open { display:block; pointer-events:all; }

/* X close — top left corner */
#popup-close {
  position:fixed; top:22px; left:22px; z-index:10001;
  width:32px; height:32px; border-radius:50%;
  border:1px solid #2a2a2a; background:rgba(10,10,10,.7);
  backdrop-filter:blur(8px);
  color:#555; font-size:12px; cursor:pointer;
  display:none; align-items:center; justify-content:center;
  transition:color .2s, border-color .2s, transform .2s;
}
#popup-close:hover { color:#e8e8e8; border-color:#555; transform:scale(1.1); }
#popup.open ~ #popup-close { display:flex; }

/* left: floating description */
#po-left {
  position:absolute; left:clamp(20px,5vw,72px); top:50%;
  transform:translateY(-50%) translateX(-18px);
  width:190px; opacity:0;
  transition:opacity .5s .15s, transform .5s .15s cubic-bezier(.2,.8,.2,1);
  pointer-events:none;
}
#popup.open #po-left { opacity:1; transform:translateY(-50%) translateX(0); pointer-events:all; }
#pi-tag  { font-size:8px; color:#363636; letter-spacing:.12em; text-transform:uppercase; margin-bottom:10px; }
#pi-name { font-size:18px; font-weight:700; text-transform:uppercase; letter-spacing:-.02em; color:#c8c8c8; line-height:1.1; margin-bottom:12px; }
#pi-desc { font-size:9px; color:#2c2c2c; line-height:1.7; text-transform:uppercase; letter-spacing:.04em; }
#pi-count{ margin-top:16px; font-size:8px; color:#1e1e1e; letter-spacing:.08em; text-transform:uppercase; }

/* center: vertical scroll of 9:16 videos */
#po-center {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%) scale(.92);
  height:82vh; width:auto;
  display:flex; align-items:flex-start;
  opacity:0; transition:opacity .45s .05s, transform .45s .05s cubic-bezier(.2,.8,.2,1);
}
#popup.open #po-center { opacity:1; transform:translate(-50%,-50%) scale(1); }

#po-scroller {
  height:100%; overflow-y:scroll; overflow-x:hidden;
  scroll-snap-type:y mandatory; scrollbar-width:none;
  display:flex; flex-direction:column; gap:12px;
  padding:8px 0;
}
#po-scroller::-webkit-scrollbar { display:none; }

.pv-item {
  flex-shrink:0; width:min(56vw,320px); aspect-ratio:9/16;
  border-radius:16px; overflow:hidden;
  background:#0a0a0a;
  scroll-snap-align:center; position:relative;
  cursor:default;
}
.pv-item video, .pv-item img { width:100%; height:100%; object-fit:cover; display:block; }
.pv-item.photo { width:min(80vw,680px); aspect-ratio:auto; height:auto; border-radius:14px; background:#0a0a0a; }
.pv-item.photo img { height:auto; object-fit:contain; }
.pv-item .pv-num { position:absolute; bottom:10px; left:12px; font-size:8px; color:rgba(255,255,255,.25); letter-spacing:.06em; }
.pv-item.photo { cursor:none; }

/* ═══ loupe — liquid-glass magnifier ═══ */
#loupe {
  position:fixed; z-index:11000; width:200px; height:200px; border-radius:50%;
  pointer-events:none; display:none; opacity:0;
  background-repeat:no-repeat; background-color:#0a0a0a;
  transition:opacity .18s ease, width .18s ease, height .18s ease;
  box-shadow:
    0 12px 44px rgba(0,0,0,.5),
    0 2px 10px rgba(0,0,0,.35),
    inset 0 0 0 1px rgba(255,255,255,.4),
    inset 0 4px 12px rgba(255,255,255,.35),
    inset 0 -12px 24px rgba(0,0,0,.3);
}
#loupe.show { display:block; opacity:1; }
#loupe::before {           /* specular sheen */
  content:''; position:absolute; inset:0; border-radius:50%; pointer-events:none;
  background:
    radial-gradient(115% 90% at 30% 16%, rgba(255,255,255,.5) 0%, rgba(255,255,255,0) 40%),
    radial-gradient(85% 75% at 72% 90%, rgba(255,255,255,.14) 0%, rgba(255,255,255,0) 55%);
  mix-blend-mode:screen;
}
#loupe::after {            /* refraction rim */
  content:''; position:absolute; inset:0; border-radius:50%; pointer-events:none;
  border:1px solid rgba(255,255,255,.28);
  box-shadow:inset 0 0 16px 3px rgba(255,255,255,.16), inset 0 0 2px rgba(255,255,255,.6);
}

/* right: thumbnail strip */
#po-right {
  position:absolute; right:clamp(14px,4vw,56px); top:50%;
  transform:translateY(-50%) translateX(18px);
  display:flex; flex-direction:column; gap:5px;
  max-height:82vh; overflow-y:auto; scrollbar-width:none;
  opacity:0; transition:opacity .5s .2s, transform .5s .2s cubic-bezier(.2,.8,.2,1);
}
#po-right::-webkit-scrollbar { display:none; }
#popup.open #po-right { opacity:1; transform:translateY(-50%) translateX(0); }
.po-thumb { width:48px; flex-shrink:0; aspect-ratio:9/16; border-radius:7px; overflow:hidden; background:#0d0d0d; border:1px solid #1a1a1a; cursor:pointer; opacity:.3; transition:opacity .2s, border-color .2s, transform .2s; }
.po-thumb:hover  { opacity:.6; transform:scale(1.06); }
.po-thumb.active { opacity:1; border-color:#3a3a3a; }
.po-thumb video, .po-thumb img { width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; }

/* ═══ NODES ═══ */
.node { position:absolute; border-radius:14px; background:var(--card); border:1px solid var(--border); cursor:grab; will-change:transform; transition:border-color .2s, box-shadow .2s; }
.node:hover { border-color:#2a2a2a; box-shadow:0 16px 48px rgba(0,0,0,.7); }
.node.dragging { cursor:grabbing; box-shadow:0 28px 72px rgba(0,0,0,.9); z-index:500; }
.node.selected { border-color:#ffffff; box-shadow:0 0 0 1.5px #ffffff, 0 18px 50px rgba(0,0,0,.7); }
.node.selected:hover { border-color:#ffffff; box-shadow:0 0 0 1.5px #ffffff, 0 22px 60px rgba(0,0,0,.85); }
.port { position:absolute; width:11px; height:11px; border-radius:50%; background:#131313; border:1.5px solid #272727; cursor:crosshair; z-index:10; transition:border-color .15s, transform .15s; }
.port-out { right:-5px; top:50%; transform:translateY(-50%); }
.port-in  { left:-5px;  top:50%; transform:translateY(-50%); }
.port:hover { border-color:#666; }

/* hub */
.nd-hub { width:220px; cursor:pointer; }
.hub-head { padding:14px 18px 9px; border-bottom:1px solid #141414; display:flex; align-items:center; justify-content:space-between; }
.hub-tag  { font-size:8px; color:#262626; letter-spacing:.1em; text-transform:uppercase; }
.hub-title { font-size:17px; font-weight:700; text-transform:uppercase; letter-spacing:-.01em; color:#ccc; padding:10px 18px 5px; line-height:1.15; }
.hub-sub   { font-size:8px; color:#262626; text-transform:uppercase; letter-spacing:.07em; padding:0 18px 12px; }
.hub-foot  { padding:9px 18px; border-top:1px solid #141414; display:flex; align-items:center; justify-content:space-between; }
.hub-hint  { font-size:7px; color:#222; letter-spacing:.07em; text-transform:uppercase; }
.hub-counter { font-size:10px; color:#333; font-weight:600; transition:color .4s; }
.hub-counter.full { color:#4ade80; }
.nd-hub.pulse::after { content:''; position:absolute; inset:-5px; border-radius:18px; border:1px solid rgba(255,255,255,.1); animation:pulseRing .5s ease-out forwards; }
@keyframes pulseRing { from{opacity:1;transform:scale(1)} to{opacity:0;transform:scale(1.07)} }

/* stack */
.nd-stack { cursor:pointer; width:248px; }
.stack-wrap { position:relative; width:248px; height:330px; pointer-events:none; }
.stack-card { position:absolute; inset:0; border-radius:13px; background:#0d0d0d; border:1px solid #1c1c1c; overflow:hidden; transform-origin:bottom center; transition:transform .35s cubic-bezier(.2,.8,.2,1); backface-visibility:hidden; }
.stack-card video { width:100%; height:100%; object-fit:cover; display:block; }
.nd-stack:hover .stack-card { transition:transform .3s cubic-bezier(.2,.8,.2,1); }
.stack-foot { padding:9px 14px 11px; border-top:1px solid #141414; display:flex; align-items:center; justify-content:space-between; }
.stack-name  { font-size:11px; color:#bbb; font-weight:600; }
.stack-meta  { font-size:8px; color:#262626; text-transform:uppercase; letter-spacing:.06em; }
.stack-open  { font-size:7px; color:#262626; text-transform:uppercase; letter-spacing:.08em; }

/* chrome */
#topbar { position:fixed; top:0; left:0; right:0; z-index:8000; pointer-events:none; padding:14px 20px; display:flex; justify-content:space-between; }
#tb-name { font-size:9px; color:#222; letter-spacing:.1em; text-transform:uppercase; }
#tb-meta { font-size:9px; color:#1e1e1e; display:flex; gap:14px; }
#nav { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:8000; background:rgba(10,10,10,.94); border:1px solid #181818; border-radius:100px; padding:5px; display:flex; gap:2px; backdrop-filter:blur(12px); }
.nav-btn { border:none; background:transparent; color:#282828; font-family:inherit; font-size:8px; letter-spacing:.1em; text-transform:uppercase; padding:6px 14px; border-radius:100px; cursor:pointer; transition:background .2s,color .2s; }
.nav-btn:hover,.nav-btn.active { background:#161616; color:#555; }
#toast { position:fixed; bottom:62px; left:50%; transform:translateX(-50%) translateY(6px); background:#111; border:1px solid #1c1c1c; border-radius:8px; padding:6px 13px; font-size:8px; color:#333; letter-spacing:.07em; text-transform:uppercase; opacity:0; transition:opacity .3s,transform .3s; pointer-events:none; z-index:8000; white-space:nowrap; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#wire-svg { position:fixed; inset:0; pointer-events:none; z-index:7000; overflow:visible; }
#wire-path { fill:none; stroke:rgba(255,255,255,.45); stroke-width:1.5; stroke-dasharray:5 3; filter:drop-shadow(0 0 5px rgba(255,255,255,.18)); }
#wire-dot  { fill:rgba(255,255,255,.6); filter:drop-shadow(0 0 4px rgba(255,255,255,.3)); }

/* general node pulse ring */
.node.pulse::after { content:''; position:absolute; inset:-5px; border-radius:18px; border:1px solid rgba(255,255,255,.14); animation:pulseRing .5s ease-out forwards; pointer-events:none; }

/* empty / placeholder stack cards */
.stack-card.ph { background:repeating-linear-gradient(135deg,#0c0c0c,#0c0c0c 7px,#101010 7px,#101010 14px); }
.nd-empty .stack-meta { color:#3a3a3a; }

/* ═══ panel nodes (form / contacts) ═══ */
.nd-panel, .nd-contact { width:232px; cursor:grab; }
.pn-head { padding:13px 16px 11px; border-bottom:1px solid #141414; }
.pn-tag { display:block; font-size:8px; color:#262626; letter-spacing:.1em; text-transform:uppercase; margin-bottom:7px; }
.pn-title { font-size:14px; font-weight:700; color:#cccccc; text-transform:uppercase; letter-spacing:-.01em; }
.pn-body { padding:14px 16px 16px; display:flex; flex-direction:column; }
.pn-label { font-size:8px; color:#3a3a3a; letter-spacing:.09em; text-transform:uppercase; margin:8px 0 5px; }
.pn-input { background:#141414; border:1px solid #242424; border-radius:9px; padding:9px 11px; color:#dddddd; font-family:inherit; font-size:11px; outline:none; resize:none; user-select:text; -webkit-user-select:text; cursor:text; transition:border-color .2s; }
.pn-input:focus { border-color:#3a3a3a; }
.pn-input::placeholder { color:#333333; }
.pn-btn { margin-top:14px; background:#e8e8e8; color:#0a0a0a; border:none; border-radius:9px; padding:10px; font-family:inherit; font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; transition:opacity .2s; }
.pn-btn:hover { opacity:.85; }
.ct-row { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-top:1px solid #141414; text-decoration:none; cursor:pointer; }
.ct-label { font-size:8px; color:#3a3a3a; letter-spacing:.1em; text-transform:uppercase; }
.ct-val { font-size:11px; color:#bbbbbb; transition:color .2s; }
.ct-row:hover .ct-val { color:#ffffff; }

/* ═══ double-click context menu ═══ */
#cmenu {
  position:fixed; z-index:12000; width:300px; max-width:calc(100vw - 24px);
  background:#0d0d0d; border:1px solid #232323; border-radius:20px;
  padding:12px; box-shadow:0 24px 70px rgba(0,0,0,.75);
  font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
  display:none; opacity:0; transform:scale(.96); transform-origin:top left;
  transition:opacity .16s, transform .16s cubic-bezier(.2,.8,.2,1);
}
#cmenu.open { opacity:1; transform:scale(1); }
.cm-search { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.cm-box { flex:1; display:flex; align-items:center; gap:9px; background:#141414; border:1px solid #262626; border-radius:12px; padding:10px 13px; }
.cm-ic { color:#555555; font-size:16px; line-height:1; }
#cm-input { flex:1; background:transparent; border:none; outline:none; color:#e8e8e8; font-family:inherit; font-size:15px; }
#cm-input::placeholder { color:#555555; }
.cm-filter { width:40px; height:40px; flex-shrink:0; border-radius:50%; border:1px solid #262626; background:#141414; color:#666666; display:flex; align-items:center; justify-content:center; font-size:15px; cursor:pointer; }
.cm-list { display:flex; flex-direction:column; margin-top:2px; }
.cm-item { padding:12px; border-radius:11px; color:#e8e8e8; font-size:15px; cursor:pointer; transition:background .12s; }
.cm-item:hover { background:#1a1a1a; }
.cm-item.hidden { display:none; }
</style>
</head>
<body>
<div id="grid"></div>
<div id="canvas"><div id="world"><svg id="conn"></svg></div></div>
<div id="vignette-blur"></div>
<div id="vignette-dark"></div>
<div id="vignette-rim"></div>
<div id="squeeze"></div>

<!-- POPUP -->
<div id="popup">
  <div id="po-left">
    <div id="pi-tag"></div>
    <div id="pi-name"></div>
    <div id="pi-desc"></div>
    <div id="pi-count"></div>
  </div>
  <div id="po-center">
    <div id="po-scroller"></div>
  </div>
  <div id="po-right"></div>
</div>
<!-- X close button — sibling of popup, always on top -->
<button id="popup-close">✕</button>

<svg id="wire-svg">
  <path id="wire-path" d=""/>
  <circle id="wire-dot" cx="-999" cy="-999" r="5"/>
</svg>
<div id="topbar">
  <div id="tb-name">jadoree</div>
  <div id="tb-meta"><span id="tb-time"></span><span>©2026</span></div>
</div>

<!-- double-click context menu -->
<div id="cmenu">
  <div class="cm-list" id="cm-list">
    <div class="cm-item" data-act="start">Start project with me</div>
    <div class="cm-item" data-act="contacts">Contacts</div>
    <div class="cm-item" data-act="about">About me</div>
    <div class="cm-item" data-act="restart">Restart Web</div>
  </div>
</div>

<div id="toast"></div>

<script>
function vp(p){ return p.split('/').map(encodeURIComponent).join('/'); }

const PROJECTS = [
  { id:'dibrain', name:'Dibrain Studio', tag:'AI · Social Media · 2024', desc:'Content direction and AI-generated visual identity for Dibrain Studio creative brand.', spawnDX:430, spawnDY:-190,
    videos:['videos/dibrain/01.mp4','videos/dibrain/02.mp4','videos/dibrain/03.mp4','videos/dibrain/04.mp4','videos/dibrain/05.mp4','videos/dibrain/06.mp4','videos/dibrain/07.mp4','videos/dibrain/08.mp4'].map(vp) },
  { id:'huggito', name:'Huggito', tag:'AI · Content · 2024', desc:'AI-driven content strategy and generative visuals for Huggito social presence.', spawnDX:430, spawnDY:230,
    videos:['videos/huggito/01.mp4','videos/huggito/02.mp4','videos/huggito/03.mp4','videos/huggito/04.mp4','videos/huggito/05.mp4','videos/huggito/06.mp4','videos/huggito/07.mp4','videos/huggito/08.mp4'].map(vp) }
];

// ── contact info (edit these) ──
const CONTACT_EMAIL = 'jadorelarami@gmail.com';
const CONTACTS = [
  { label:'Email',     val:'jadorelarami@gmail.com', href:'mailto:jadorelarami@gmail.com' },
  { label:'Telegram',  val:'@jadoree',               href:'https://t.me/jadoree' },
  { label:'Instagram', val:'@jadoree',               href:'https://instagram.com/jadoree' }
];

// ── photo project under "AI Photo Direction" ──
const FIZULI = { id:'fizuli', name:'FIZULI', tag:'Clothing Brand · Photo', desc:'Photo direction and art direction for FIZULI clothing brand editorial campaign.', spawnDX:430, spawnDY:-60,
  images:['photos/fizuli/01.jpg','photos/fizuli/02.jpg'].map(vp),
  full:['photos/fizuli/full/01.jpg','photos/fizuli/full/02.jpg'].map(vp) };

const world=document.getElementById('world'), connSvg=document.getElementById('conn'), canvas=document.getElementById('canvas'), gridEl=document.getElementById('grid');
let pan={x:0,y:0}, zoom=1, nid=0, nodes=[], edges=[];
const PAN_FRICTION=.88, DRAG_LERP=.18, NODE_FRICTION=.82, ZOOM_SMOOTH=.13;
let panVel={x:0,y:0}, panPhysics=false;
let dragNode=null, dragTarget={x:0,y:0}, dragCurrent={x:0,y:0}, dragAnimId=null;
let nodeVel={x:0,y:0}, lastDT={x:0,y:0}, lastDTime=0;
let panning=false, panStart={x:0,y:0}, panPrev={x:0,y:0}, panOrig={x:0,y:0}, panTime=0;
let wireFrom=null;
let targetZoom=1, zoomAnimId=null, zoomCX=0, zoomCY=0, zoomWX=0, zoomWY=0;
let spawnedCount=0;

function applyT(){
  world.style.transform=`translate(${pan.x}px,${pan.y}px) scale(${zoom})`;
  const s=30*zoom, ox=((pan.x%s)+s)%s, oy=((pan.y%s)+s)%s;
  gridEl.style.backgroundSize=`${s}px ${s}px`;
  gridEl.style.backgroundPosition=`${ox}px ${oy}px`;
}
function s2w(sx,sy){return{x:(sx-pan.x)/zoom,y:(sy-pan.y)/zoom};}
function bez(x1,y1,x2,y2){ const d=Math.max(Math.abs(x2-x1)*.5,50); return `M${x1},${y1} C${x1+d},${y1} ${x2-d},${y2} ${x2},${y2}`; }

function addEdge(from,to){ if(!edges.find(e=>e.from===from&&e.to===to)) edges.push({from,to}); renderEdges(); }
function renderEdges(){
  connSvg.innerHTML='';
  for(const e of edges){
    const a=nodes.find(n=>n.id===e.from), b=nodes.find(n=>n.id===e.to); if(!a||!b) continue;
    const pO=a.el.querySelector('.port-out'), pI=b.el.querySelector('.port-in');
    const ax=a.x+(pO?pO.offsetLeft+pO.offsetWidth/2:a.el.offsetWidth), ay=a.y+(pO?pO.offsetTop+pO.offsetHeight/2:a.el.offsetHeight/2);
    const bx=b.x+(pI?pI.offsetLeft+pI.offsetWidth/2:0),               by=b.y+(pI?pI.offsetTop+pI.offsetHeight/2:b.el.offsetHeight/2);

function spawnProject(proj,fromId){
  const hub=nodes.find(n=>n.id===fromId);

  el.addEventListener('mouseleave',()=>{ el.querySelectorAll('.stack-card').forEach((c,i)=>{ const d=MAX-1-i; c.style.transform=`rotate(${-d*2.8}deg) translate(${-d*7}px,${d*7}px) scale(${1-d*0.018})`; }); });
  el.addEventListener('mousedown',e=>{ if(e.target.classList.contains('port'))return; e.stopPropagation(); el._dragMoved=false; el._dragSX=e.clientX; el._dragSY=e.clientY; startDragNode(e,id); });
  el.querySelector('.port-out').addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();startWire(e,id);});
  el.addEventListener('click',e=>{ if(e.target.classList.contains('port')||el._dragMoved)return; openPopup(proj); });

// ── menu → spawn nodes (one per kind, focus if already open) ──
const kindNodes={};
function animateIn(el){ el.style.opacity='0'; el.style.transform='scale(.9) translateY(12px)'; el.style.transition='opacity .4s,transform .4s cubic-bezier(.2,.8,.2,1)'; requestAnimationFrame(()=>requestAnimationFrame(()=>{ el.style.opacity='1'; el.style.transform=''; setTimeout(()=>el.style.transition='',450); })); }
let panAnim=null;
function animatePan(tx,ty){ cancelAnimationFrame(panAnim); (function step(){ pan.x+=(tx-pan.x)*.18; pan.y+=(ty-pan.y)*.18; applyT(); if(Math.abs(tx-pan.x)>.5||Math.abs(ty-pan.y)>.5) panAnim=requestAnimationFrame(step); })(); }
function focusNode(node){ const w=node.el.offsetWidth||220, h=node.el.offsetHeight||200; animatePan(window.innerWidth/2-(node.x+w/2)*zoom, window.innerHeight/2-(node.y+h/2)*zoom); }
function spawnFromMenu(kind){
  if(kindNodes[kind] && document.body.contains(kindNodes[kind].el)){ focusNode(kindNodes[kind]); pulse(kindNodes[kind].el); return; }
  const off=Object.keys(kindNodes).length*44;
  const c=s2w(window.innerWidth/2, window.innerHeight/2);

// ── LOUPE (liquid-glass magnifier, originals lazy-loaded) ──
const loupeEl=document.createElement('div'); loupeEl.id='loupe'; document.body.appendChild(loupeEl);
const LOUPE_R=100, LOUPE_ZOOM=2;
const fullCache={};
function ensureFull(src){ if(fullCache[src])return fullCache[src]; const rec={loaded:false}; const img=new Image(); rec.img=img; img.onload=()=>rec.loaded=true; img.src=src; fullCache[src]=rec; return rec; }
function attachLoupe(item){
  const img=item.querySelector('img'); if(!img)return;
  const full=item.dataset.full||img.getAttribute('src');
  item.addEventListener('mouseenter',()=>{ ensureFull(full); }); // load original only now
  item.addEventListener('mousemove',ev=>{
    const rect=img.getBoundingClientRect();
    const x=ev.clientX-rect.left, y=ev.clientY-rect.top;
    if(x<0||y<0||x>rect.width||y>rect.height){ loupeEl.classList.remove('show'); return; }
    const rec=ensureFull(full);
    const bg=rec.loaded?full:img.getAttribute('src');
    loupeEl.style.backgroundImage=`url("${bg}")`;
    loupeEl.style.backgroundSize=`${rect.width*LOUPE_ZOOM}px ${rect.height*LOUPE_ZOOM}px`;
    loupeEl.style.backgroundPosition=`${LOUPE_R-x*LOUPE_ZOOM}px ${LOUPE_R-y*LOUPE_ZOOM}px`;
    loupeEl.style.left=(ev.clientX-LOUPE_R)+'px';
    loupeEl.style.top=(ev.clientY-LOUPE_R)+'px';
    loupeEl.classList.add('show');
  });
  item.addEventListener('mouseleave',()=>{ loupeEl.classList.remove('show'); });
}
function hideLoupe(){ loupeEl.classList.remove('show'); }

// ── POPUP ──
const popupEl=document.getElementById('popup'), poScroller=document.getElementById('po-scroller'), poRight=document.getElementById('po-right');
let popupOpen=false, currentProj=null, popupIO=null;

function openPopup(proj){
  if(popupOpen)return;
  popupOpen=true; currentProj=proj;
  const media=proj.videos||proj.images||[]; const isVideo=!!proj.videos;
  document.getElementById('pi-tag').textContent=proj.tag;
  document.getElementById('pi-name').textContent=proj.name;
  document.getElementById('pi-desc').textContent=proj.desc;
  document.getElementById('pi-count').textContent=`${media.length} ${isVideo?'videos':'photos'}`;

  // build scroll items
  poScroller.innerHTML='';
  if(popupIO){ popupIO.disconnect(); popupIO=null; }
  popupIO=new IntersectionObserver(entries=>{
    entries.forEach(en=>{
      const v=en.target.querySelector('video'); if(!v)return;
      if(en.isIntersecting){ v.setAttribute('autoplay',''); v.play().catch(()=>{}); }
      else { v.removeAttribute('autoplay'); v.pause(); }
    });
  },{root:poScroller, threshold:0.4});

  media.forEach((src,i)=>{
    const item=document.createElement('div'); item.className='pv-item'+(isVideo?'':' photo');
    let m;
    if(isVideo){ m=document.createElement('video'); m.src=src; m.muted=true; m.playsInline=true; m.preload='auto'; m.loop=true; }
    else { m=document.createElement('img'); m.src=src; m.alt=''; item.dataset.full=(proj.full&&proj.full[i])||src; }
    const num=document.createElement('div'); num.className='pv-num'; num.textContent=String(i+1).padStart(2,'0');
    item.append(m,num); poScroller.appendChild(item);
    if(!isVideo) attachLoupe(item);
    popupIO.observe(item);
  });
  poScroller.scrollTop=0;

  // build thumb strip
  poRight.innerHTML='';
  media.forEach((src,i)=>{
    const thumb=document.createElement('div'); thumb.className='po-thumb'+(i===0?' active':'');
    let v;
    if(isVideo){ v=document.createElement('video'); v.src=src; v.muted=true; v.playsInline=true; v.preload='auto'; v.addEventListener('loadeddata',()=>{v.currentTime=0.5;},{once:true}); v.load(); }
    else { v=document.createElement('img'); v.src=src; v.alt=''; }
    thumb.appendChild(v);
    thumb.addEventListener('click',()=>{
      const items=[...poScroller.querySelectorAll('.pv-item')];
      items[i]?.scrollIntoView({behavior:'smooth',block:'center'});
      poRight.querySelectorAll('.po-thumb').forEach((t,j)=>t.classList.toggle('active',j===i));
    });
    poRight.appendChild(thumb);
  });

  // sync thumb active on scroll
  poScroller.addEventListener('scroll', syncThumb);

  popupEl.classList.add('open');
  document.body.classList.add('popup-open');
}

function syncThumb(){
  const items=[...poScroller.querySelectorAll('.pv-item')];
  const mid=poScroller.scrollTop+poScroller.clientHeight/2;
  let closest=0, minD=Infinity;
  items.forEach((item,i)=>{ const d=Math.abs(item.offsetTop+item.offsetHeight/2-mid); if(d<minD){minD=d;closest=i;} });
  poRight.querySelectorAll('.po-thumb').forEach((t,i)=>t.classList.toggle('active',i===closest));
  poRight.querySelectorAll('.po-thumb')[closest]?.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function closePopup(){
  if(!popupOpen)return;
  hideLoupe();
  popupEl.classList.remove('open');
  document.body.classList.remove('popup-open');
  poScroller.removeEventListener('scroll',syncThumb);
  if(popupIO){popupIO.disconnect();popupIO=null;}
  poScroller.querySelectorAll('video').forEach(v=>v.pause());
  setTimeout(()=>{ poScroller.innerHTML=''; poRight.innerHTML=''; popupOpen=false; currentProj=null; },500);
}

document.getElementById('popup-close').addEventListener('click',closePopup);
// click on squeeze (dark bg) closes
document.getElementById('squeeze').addEventListener('click',closePopup);
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&popupOpen)closePopup();});

// ── SELECTION / DELETE / UNDO ──
let selectedNode=null, undoStack=[];
function selectNode(node){ if(selectedNode&&selectedNode!==node)selectedNode.el.classList.remove('selected'); selectedNode=node; if(node)node.el.classList.add('selected'); }
function deselect(){ if(selectedNode){selectedNode.el.classList.remove('selected'); selectedNode=null;} }
function deleteNode(node){
  const rel=edges.filter(e=>e.from===node.id||e.to===node.id);
  edges=edges.filter(e=>e.from!==node.id&&e.to!==node.id);
  const idx=nodes.indexOf(node); if(idx>=0)nodes.splice(idx,1);
  node.el.classList.remove('selected'); node.el.remove();
  undoStack.push({node,edges:rel,idx});
  if(selectedNode===node)selectedNode=null;
  renderEdges();
}
function undoDelete(){
  const last=undoStack.pop(); if(!last)return;
  world.appendChild(last.node.el);
  nodes.splice(Math.min(last.idx,nodes.length),0,last.node);
  last.edges.forEach(e=>{ if(!edges.find(x=>x.from===e.from&&x.to===e.to))edges.push(e); });
  renderEdges(); selectNode(last.node);
}
document.addEventListener('keydown',e=>{
  const typing=/^(input|textarea)$/i.test(document.activeElement?.tagName||'');
  if(typing||popupOpen||menuOpen)return;
  if((e.key==='Delete'||e.key==='Backspace')&&selectedNode){ e.preventDefault(); deleteNode(selectedNode); }
  else if((e.metaKey||e.ctrlKey)&&(e.key==='z'||e.key==='Z')){ e.preventDefault(); undoDelete(); }
});

// ── DRAG ──
function startDragNode(e,id){
  if(dragNode){dragNode.el.classList.remove('dragging');dragNode._released=false;cancelAnimationFrame(dragAnimId);dragAnimId=null;}
  dragNode=nodes.find(n=>n.id===id); if(!dragNode)return;
  selectNode(dragNode);
  const w=s2w(e.clientX,e.clientY);
  dragNode._offX=w.x-dragNode.x; dragNode._offY=w.y-dragNode.y; dragNode._released=false;
  dragCurrent={x:dragNode.x,y:dragNode.y}; lastDT={x:dragNode.x,y:dragNode.y}; lastDTime=performance.now(); nodeVel={x:0,y:0};
  dragNode.el.classList.add('dragging');
}
function tickDragNode(){
  if(!dragNode)return;
  if(dragNode._released){
    nodeVel.x*=NODE_FRICTION; nodeVel.y*=NODE_FRICTION;
    dragNode.x+=nodeVel.x; dragNode.y+=nodeVel.y;
    dragNode.el.style.left=dragNode.x+'px'; dragNode.el.style.top=dragNode.y+'px'; renderEdges();
    if(Math.abs(nodeVel.x)>.12||Math.abs(nodeVel.y)>.12) dragAnimId=requestAnimationFrame(tickDragNode);
    else{dragNode.el.classList.remove('dragging');dragNode=null;dragAnimId=null;} return;
  }
  dragCurrent.x+=(dragTarget.x-dragCurrent.x)*DRAG_LERP; dragCurrent.y+=(dragTarget.y-dragCurrent.y)*DRAG_LERP;
  dragNode.x=dragCurrent.x; dragNode.y=dragCurrent.y;
  dragNode.el.style.left=dragNode.x+'px'; dragNode.el.style.top=dragNode.y+'px'; renderEdges();
  const dx=Math.abs(dragTarget.x-dragCurrent.x),dy=Math.abs(dragTarget.y-dragCurrent.y);
  if(dx>.1||dy>.1) dragAnimId=requestAnimationFrame(tickDragNode); else dragAnimId=null;
}
function startPanPhysics(){ if(panPhysics)return; panPhysics=true; (function tick(){ panVel.x*=PAN_FRICTION; panVel.y*=PAN_FRICTION; if(Math.abs(panVel.x)<.3&&Math.abs(panVel.y)<.3){panPhysics=false;return;} pan.x+=panVel.x; pan.y+=panVel.y; applyT(); requestAnimationFrame(tick); })(); }
function tickZoom(){ const d=targetZoom-zoom; if(Math.abs(d)<.0005){zoom=targetZoom;applyT();zoomAnimId=null;return;} zoom+=d*ZOOM_SMOOTH; pan.x=zoomCX-zoomWX*zoom; pan.y=zoomCY-zoomWY*zoom; applyT(); zoomAnimId=requestAnimationFrame(tickZoom); }

function startWire(e,id){ wireFrom=id; const n=nodes.find(n=>n.id===id); if(!n)return; const px=(n.x+n.el.offsetWidth)*zoom+pan.x, py=(n.y+n.el.offsetHeight/2)*zoom+pan.y; document.getElementById('wire-dot').setAttribute('cx',px); document.getElementById('wire-dot').setAttribute('cy',py); document.getElementById('wire-path').setAttribute('d',bez(px,py,e.clientX,e.clientY)); }
function updateWire(mx,my){ if(wireFrom===null)return; const n=nodes.find(n=>n.id===wireFrom); if(!n)return; const px=(n.x+n.el.offsetWidth)*zoom+pan.x, py=(n.y+n.el.offsetHeight/2)*zoom+pan.y; document.getElementById('wire-path').setAttribute('d',bez(px,py,mx,my)); document.getElementById('wire-dot').setAttribute('cx',px); document.getElementById('wire-dot').setAttribute('cy',py); }
function endWire(mx,my){ if(wireFrom===null)return; const els=document.elementsFromPoint(mx,my); const pin=els.find(e=>e.classList.contains('port-in')); if(pin){const tn=pin.closest('.node');if(tn){const tid=parseInt(tn.dataset.id);if(tid!==wireFrom)addEdge(wireFrom,tid);}} document.getElementById('wire-path').setAttribute('d',''); document.getElementById('wire-dot').setAttribute('cx','-999'); document.getElementById('wire-dot').setAttribute('cy','-999'); wireFrom=null; }

window.addEventListener('mousemove',e=>{
  if(dragNode&&!dragNode._released){
    const now=performance.now(),dt=now-lastDTime+.001, w=s2w(e.clientX,e.clientY);
    const nx=w.x-(dragNode._offX||0),ny=w.y-(dragNode._offY||0);
    nodeVel.x=(nx-lastDT.x)/dt*10; nodeVel.y=(ny-lastDT.y)/dt*10;
    lastDT={x:nx,y:ny}; lastDTime=now; dragTarget.x=nx; dragTarget.y=ny;
    const sx=dragNode.el._dragSX??e.clientX, sy=dragNode.el._dragSY??e.clientY;
    if(Math.abs(e.clientX-sx)>6||Math.abs(e.clientY-sy)>6) dragNode.el._dragMoved=true;
    if(!dragAnimId)dragAnimId=requestAnimationFrame(tickDragNode); return;
  }
  updateWire(e.clientX,e.clientY);
  if(panning){ const now=performance.now(),dt=now-panTime+.001; panVel.x=(e.clientX-panPrev.x)/dt*16; panVel.y=(e.clientY-panPrev.y)/dt*16; panPrev={x:e.clientX,y:e.clientY}; panTime=now; pan.x=panOrig.x+(e.clientX-panStart.x); pan.y=panOrig.y+(e.clientY-panStart.y); applyT(); }
});
window.addEventListener('mouseup',e=>{
  if(dragNode&&!dragNode._released){ dragNode._released=true; const mv=16; nodeVel.x=Math.max(-mv,Math.min(mv,nodeVel.x)); nodeVel.y=Math.max(-mv,Math.min(mv,nodeVel.y)); if(!dragAnimId)dragAnimId=requestAnimationFrame(tickDragNode); }
  endWire(e.clientX,e.clientY);
  if(panning){panning=false;canvas.style.cursor='';startPanPhysics();}
});
canvas.addEventListener('mousedown',e=>{ const empty=e.target===canvas||e.target===world||e.target.tagName==='path'||e.target===connSvg; if(!empty||wireFrom!==null)return; deselect(); panning=true; panStart={x:e.clientX,y:e.clientY}; panPrev={x:e.clientX,y:e.clientY}; panOrig={...pan}; panTime=performance.now(); panVel={x:0,y:0}; canvas.style.cursor='grabbing'; });
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  if(e.ctrlKey){ // trackpad pinch (or ctrl+wheel) → zoom, keep momentum toward cursor
    let dy=e.deltaY; if(e.deltaMode===1)dy*=30; if(e.deltaMode===2)dy*=300; dy=Math.max(-80,Math.min(80,dy));
    targetZoom=Math.min(Math.max(targetZoom*(1-dy*.01),.12),4);
    zoomCX=e.clientX; zoomCY=e.clientY; zoomWX=(e.clientX-pan.x)/zoom; zoomWY=(e.clientY-pan.y)/zoom;
    if(!zoomAnimId)zoomAnimId=requestAnimationFrame(tickZoom);
  } else { // two-finger drag → pan
    let dx=e.deltaX, dy=e.deltaY;
    if(e.deltaMode===1){dx*=30;dy*=30;} if(e.deltaMode===2){dx*=300;dy*=300;}
    pan.x-=dx; pan.y-=dy; applyT();
  }
},{passive:false});

// ── double-click context menu ──
const cmenu=document.getElementById('cmenu'); let menuOpen=false;
function openMenu(x,y){
  cmenu.style.display='block';
  const w=cmenu.offsetWidth, h=cmenu.offsetHeight;
  cmenu.style.left=Math.max(12,Math.min(x,window.innerWidth-w-12))+'px';
  cmenu.style.top =Math.max(12,Math.min(y,window.innerHeight-h-12))+'px';
  requestAnimationFrame(()=>cmenu.classList.add('open'));
  menuOpen=true;
}
function closeMenu(){ if(!menuOpen)return; menuOpen=false; cmenu.classList.remove('open'); setTimeout(()=>{ if(!menuOpen)cmenu.style.display='none'; },180); }
document.getElementById('cm-list').addEventListener('click',e=>{ const it=e.target.closest('.cm-item'); if(!it)return; const act=it.dataset.act; closeMenu(); if(act==='restart'){location.reload();return;} spawnFromMenu(act); });
document.addEventListener('mousedown',e=>{ if(menuOpen && !cmenu.contains(e.target)) closeMenu(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&menuOpen)closeMenu(); });
canvas.addEventListener('dblclick',e=>{ const empty=e.target===canvas||e.target===world||e.target===connSvg||e.target.tagName==='path'; if(!empty)return; openMenu(e.clientX,e.clientY); });

function updateTime(){const d=new Date();document.getElementById('tb-time').textContent=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} GMT`;}
updateTime(); setInterval(updateTime,10000);
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800);}

const CX=window.innerWidth/2, CY=window.innerHeight/2;
zoom=targetZoom=0.78;
const hub=createHub(0,0);
spawnProject(PROJECTS[0],hub.id);
spawnProject(PROJECTS[1],hub.id);
const photoHub=createHub(hub.x, hub.y+720, {title:'AI Photo<br>Direction', sub:'photo direction', hint:'category', badge:'live'});
spawnProject(FIZULI,photoHub.id);
pan.x=CX-(110+430/2)*zoom; pan.y=CY-150*zoom; applyT();
setTimeout(()=>toast('double-click anywhere for the menu'),900);
</script>
